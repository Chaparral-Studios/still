<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Still — Extension Test Page</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
      color: #333;
    }
    h1 { font-size: 1.4em; }
    .test-case {
      margin: 30px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .test-case h2 { font-size: 1em; margin-top: 0; }
    img { display: block; margin: 10px 0; }
    .status { color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Still — Manual Test Page</h1>
  <p class="status">If the extension is working, the GIF below should be replaced with a gray pause-icon placeholder.</p>

  <div class="test-case">
    <h2>1. Animated GIF (5fps bouncing ball)</h2>
    <img src="test-slow.gif" width="200" height="200" alt="Animated GIF test">
  </div>

  <div class="test-case">
    <h2>2. Static PNG (should be unaffected)</h2>
    <img src="static.png" width="100" height="100" alt="Static PNG test">
  </div>

  <div class="test-case">
    <h2>3. Video element (should be replaced)</h2>
    <video autoplay loop muted playsinline width="200" height="200">
      <source src="test-slow.gif" type="image/gif">
    </video>
  </div>
</body>
</html>
