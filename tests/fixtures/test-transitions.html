<!DOCTYPE html>
<html>
<head>
  <title>Transition Kill Test</title>
  <style>
    /* Amazon-style: transition: all on root, cascades everywhere */
    html { transition: all; }

    .carousel { position: relative; width: 400px; height: 200px; overflow: hidden; }
    .slide {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: bold; color: white;
    }
    .slide-a { background: #e74c3c; }
    .slide-b { background: #3498db; visibility: hidden; }

    .fade-box {
      width: 200px; height: 100px; background: #2ecc71; color: white;
      display: flex; align-items: center; justify-content: center;
      margin-top: 20px; opacity: 1;
    }
  </style>
</head>
<body>
  <h2>Auto-rotating carousel (Amazon pattern)</h2>
  <div class="carousel">
    <div class="slide slide-a" id="slide-a">Slide A</div>
    <div class="slide slide-b" id="slide-b">Slide B</div>
  </div>

  <h2>Opacity fade</h2>
  <div class="fade-box" id="fade-box">Fading</div>

  <script>
    // Auto-rotate every 2 seconds (Amazon does 6s)
    let showA = true;
    setInterval(() => {
      showA = !showA;
      document.getElementById('slide-a').style.visibility = showA ? 'visible' : 'hidden';
      document.getElementById('slide-b').style.visibility = showA ? 'hidden' : 'visible';
    }, 2000);

    // Pulse opacity
    let fadeIn = true;
    setInterval(() => {
      fadeIn = !fadeIn;
      document.getElementById('fade-box').style.opacity = fadeIn ? '1' : '0.3';
    }, 1500);
  </script>
</body>
</html>
