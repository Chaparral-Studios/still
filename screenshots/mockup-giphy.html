<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GIPHY - Be Animated</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #121212; color: #fff; font-family: -apple-system, system-ui, sans-serif; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: #121212;
}
.logo { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
.logo span { color: #fff; }
.header-icons { display: flex; gap: 12px; }
.header-icons span { font-size: 20px; color: #fff; opacity: 0.8; }

.search-bar {
  margin: 8px 16px; padding: 10px 16px; background: #2e2e2e;
  border-radius: 8px; color: #999; font-size: 15px;
  display: flex; justify-content: space-between; align-items: center;
}
.search-icon { color: #f06; font-size: 20px; font-weight: bold; }

.tabs {
  display: flex; gap: 0; padding: 12px 16px; overflow-x: auto;
}
.tab {
  padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600;
  white-space: nowrap; color: #fff;
}
.tab.active { background: #6157ff; }
.tab:not(.active) { background: #2e2e2e; margin-left: 8px; }

.tags {
  display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto;
}
.tag {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 14px; background: #2e2e2e; border-radius: 20px;
  font-size: 13px; color: #fff; white-space: nowrap;
}
.tag::before { content: "🔥"; font-size: 12px; }

/* The GIF grid - this is where Still replaces images */
.grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4px; padding: 4px 4px 0;
}
.gif-placeholder {
  background: #e0e0e0; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.gif-placeholder svg {
  width: 40px; height: 40px; opacity: 0.45;
}
/* Varying heights for masonry-like feel */
.gif-placeholder:nth-child(1) { height: 180px; }
.gif-placeholder:nth-child(2) { height: 220px; }
.gif-placeholder:nth-child(3) { height: 200px; }
.gif-placeholder:nth-child(4) { height: 160px; }
.gif-placeholder:nth-child(5) { height: 190px; }
.gif-placeholder:nth-child(6) { height: 210px; }
.gif-placeholder:nth-child(7) { height: 170px; }
.gif-placeholder:nth-child(8) { height: 200px; }

/* Still badge overlay - not needed, the effect speaks for itself */
.still-badge { display: none; }
</style>
</head>
<body>

<div class="still-badge">
  <svg width="16" height="16" viewBox="0 0 100 100" fill="none">
    <rect x="25" y="15" width="14" height="70" fill="#fff" rx="4"/>
    <rect x="61" y="15" width="14" height="70" fill="#fff" rx="4"/>
  </svg>
  Still — <span class="count">8</span> blocked
</div>

  <div class="header-icons">
    <span>＋</span> <span>✦</span> <span>👤</span> <span>☰</span>
  </div>
</div>

<div class="search-bar">
  Search all the GIFs and Stickers
  <span class="search-icon">🔍</span>
</div>

<div class="tabs">

  <div class="tab">Stickers</div>
  <div class="tab">Emoji</div>
  <div class="tab">Memes</div>
  <div class="tab">Reactions</div>
</div>

<div class="tags">
  <div class="tag">yank</div>
  <div class="tag">eric</div>
  <div class="tag">baked beans</div>
  <div class="tag">take a</div>
</div>

<div class="grid">
  <div class="gif-placeholder">
    <svg viewBox="0 0 100 100"><rect x="30" y="20" width="12" height="60" fill="#bbb" rx="3"/><rect x="58" y="20" width="12" height="60" fill="#bbb" rx="3"/></svg>
  </div>
  <div class="gif-placeholder">
    <svg viewBox="0 0 100 100"><rect x="30" y="20" width="12" height="60" fill="#bbb" rx="3"/><rect x="58" y="20" width="12" height="60" fill="#bbb" rx="3"/></svg>
  </div>
  <div class="gif-placeholder">
    <svg viewBox="0 0 100 100"><rect x="30" y="20" width="12" height="60" fill="#bbb" rx="3"/><rect x="58" y="20" width="12" height="60" fill="#bbb" rx="3"/></svg>
  </div>
  <div class="gif-placeholder">
    <svg viewBox="0 0 100 100"><rect x="30" y="20" width="12" height="60" fill="#bbb" rx="3"/><rect x="58" y="20" width="12" height="60" fill="#bbb" rx="3"/></svg>
  </div>
  <div class="gif-placeholder">
    <svg viewBox="0 0 100 100"><rect x="30" y="20" width="12" height="60" fill="#bbb" rx="3"/><rect x="58" y="20" width="12" height="60" fill="#bbb" rx="3"/></svg>
  </div>
  <div class="gif-placeholder">
    <svg viewBox="0 0 100 100"><rect x="30" y="20" width="12" height="60" fill="#bbb" rx="3"/><rect x="58" y="20" width="12" height="60" fill="#bbb" rx="3"/></svg>
  </div>
  <div class="gif-placeholder">
    <svg viewBox="0 0 100 100"><rect x="30" y="20" width="12" height="60" fill="#bbb" rx="3"/><rect x="58" y="20" width="12" height="60" fill="#bbb" rx="3"/></svg>
  </div>
  <div class="gif-placeholder">
    <svg viewBox="0 0 100 100"><rect x="30" y="20" width="12" height="60" fill="#bbb" rx="3"/><rect x="58" y="20" width="12" height="60" fill="#bbb" rx="3"/></svg>

</div>

</body>
</html>
