<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GIPHY - Be Animated</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #121212; color: #fff; font-family: -apple-system, system-ui, sans-serif; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: #121212;
}
.logo { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
.header-icons { display: flex; gap: 12px; }
.header-icons span { font-size: 20px; color: #fff; opacity: 0.8; }

.search-bar {
  margin: 8px 16px; padding: 10px 16px; background: #2e2e2e;
  border-radius: 8px; color: #999; font-size: 15px;
  display: flex; justify-content: space-between; align-items: center;
}

.tabs {
  display: flex; gap: 0; padding: 12px 16px; overflow-x: auto;
}
.tab {
  padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600;
  white-space: nowrap; color: #fff;
}
.tab.active { background: #6157ff; }
.tab:not(.active) { background: #2e2e2e; margin-left: 8px; }

.tags {
  display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto;
}
.tag {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 14px; background: #2e2e2e; border-radius: 20px;
  font-size: 13px; color: #fff; white-space: nowrap;
}
.tag::before { content: "🔥"; font-size: 12px; }

.grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4px; padding: 4px 4px 0;
}
.gif-cell {
  border-radius: 4px; overflow: hidden; position: relative;
}
.gif-cell:nth-child(1) { height: 180px; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
.gif-cell:nth-child(2) { height: 220px; background: linear-gradient(135deg, #2d132c, #801336, #c72c41); }
.gif-cell:nth-child(3) { height: 200px; background: linear-gradient(135deg, #0c0032, #190061, #240090); }
.gif-cell:nth-child(4) { height: 160px; background: linear-gradient(135deg, #1b262c, #0f4c75, #3282b8); }
.gif-cell:nth-child(5) { height: 190px; background: linear-gradient(135deg, #2b2e4a, #e84545, #903749); }
.gif-cell:nth-child(6) { height: 210px; background: linear-gradient(135deg, #0d7377, #14ffec, #323232); }
.gif-cell:nth-child(7) { height: 170px; background: linear-gradient(135deg, #fc5185, #3fc1c9, #364f6b); }
.gif-cell:nth-child(8) { height: 200px; background: linear-gradient(135deg, #f38181, #fce38a, #eaffd0); }

/* Fake "GIF" badge */
.gif-cell::after {
  content: "GIF"; position: absolute; bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;
}

/* Fake motion lines to suggest animation */
.gif-cell::before {
  content: ""; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 60%; height: 60%; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">⬛ GIPHY</div>
  <div class="header-icons">
    <span>＋</span> <span>✦</span> <span>👤</span> <span>☰</span>
  </div>
</div>

<div class="search-bar">
  Search all the GIFs and Stickers
  <span style="color: #f06; font-size: 20px;">🔍</span>
</div>

<div class="tabs">
  <div class="tab active">Trending</div>
  <div class="tab">Stickers</div>
  <div class="tab">Emoji</div>
  <div class="tab">Memes</div>
  <div class="tab">Reactions</div>
</div>

<div class="tags">
  <div class="tag">yank</div>
  <div class="tag">eric</div>
  <div class="tag">baked beans</div>
  <div class="tag">take a</div>
</div>

<div class="grid">
  <div class="gif-cell"></div>
  <div class="gif-cell"></div>
  <div class="gif-cell"></div>
  <div class="gif-cell"></div>
  <div class="gif-cell"></div>
  <div class="gif-cell"></div>
  <div class="gif-cell"></div>
  <div class="gif-cell"></div>
</div>

</body>
</html>
